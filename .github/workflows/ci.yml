name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: 5.1.0

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test

      - name: Build
        run: |
          opam exec -- dune build

      - name: Test
        run: |
          opam exec -- dune runtest
